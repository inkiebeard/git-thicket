<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <rect x="0" y="0" width="1024" height="1024" fill="#14161a"/>

  <g fill="none" stroke="#5fbf7a" stroke-width="26" stroke-linecap="round">
    <!-- trunk -->
    <path d="M 512 950 L 512 700"/>

    <!-- first fork -->
    <path d="M 512 700 L 380 560"/>
    <path d="M 512 700 L 644 560"/>

    <!-- second fork, left side -->
    <path d="M 380 560 L 280 420"/>
    <path d="M 380 560 L 430 380"/>

    <!-- second fork, right side -->
    <path d="M 644 560 L 590 380"/>
    <path d="M 644 560 L 740 420"/>

    <!-- twigs, outer-left -->
    <path d="M 280 420 L 220 300"/>
    <path d="M 280 420 L 320 290"/>

    <!-- twigs, inner-left -->
    <path d="M 430 380 L 390 260"/>
    <path d="M 430 380 L 480 250"/>

    <!-- twigs, inner-right -->
    <path d="M 590 380 L 540 250"/>
    <path d="M 590 380 L 630 260"/>

    <!-- twigs, outer-right -->
    <path d="M 740 420 L 700 290"/>
    <path d="M 740 420 L 800 300"/>
  </g>

  <g fill="#5fbf7a">
    <!-- fork nodes -->
    <circle cx="512" cy="700" r="20"/>
    <circle cx="380" cy="560" r="20"/>
    <circle cx="644" cy="560" r="20"/>
    <circle cx="280" cy="420" r="18"/>
    <circle cx="430" cy="380" r="18"/>
    <circle cx="590" cy="380" r="18"/>
    <circle cx="740" cy="420" r="18"/>
  </g>

  <g fill="#8fe0ac">
    <!-- leaf-tip nodes, slightly brighter -->
    <circle cx="220" cy="300" r="30"/>
    <circle cx="320" cy="290" r="30"/>
    <circle cx="390" cy="260" r="30"/>
    <circle cx="480" cy="250" r="30"/>
    <circle cx="540" cy="250" r="30"/>
    <circle cx="630" cy="260" r="30"/>
    <circle cx="700" cy="290" r="30"/>
    <circle cx="800" cy="300" r="30"/>
  </g>
</svg>
